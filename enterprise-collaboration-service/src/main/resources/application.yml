spring:
  config:
    import: "optional:classpath:application-secrets.yml,optional:nacos:enterprise-collaboration-service.yaml,optional:nacos:common-config.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
  application:
    name: enterprise-collaboration-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        ip: ${NACOS_DISCOVERY_IP:127.0.0.1}
        port: ${server.port}
      config:
        server-addr: localhost:8848
        file-extension: yaml
        fail-fast: false
    compatibility-verifier:
      enabled: false
  sql:
    init:
      mode: never
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

server:
  port: 8090

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

flyway:
  enabled: false

rocketmq:
  name-server: localhost:9876
  producer:
    group: im-producer-group
    send-message-timeout: 3000
    retry-times-when-send-failed: 1

seata:
  enabled: ${SEATA_ENABLED:true}
  application-id: ${spring.application.name}
  tx-service-group: enterprise-workspace-tx-group

  registry:
    type: file

  config:
    type: file

  service:
    vgroup-mapping:
      enterprise-workspace-tx-group: default
    grouplist:
      default: 127.0.0.1:8091

app:
  gateway:
    url: ${GATEWAY_SERVICE_URL:http://localhost:8086}
  workbench:
    service-url: ${WORKBENCH_SERVICE_URL:http://localhost:8084}
  im:
    oss:
      endpoint: ${OSS_ENDPOINT:https://oss-cn-shenzhen.aliyuncs.com}
      region: ${OSS_REGION:oss-cn-shenzhen}
      access-key: ${OSS_ACCESS_KEY:}
      secret-key: ${OSS_SECRET_KEY:}
      bucket: ${OSS_IM_BUCKET:im-files}

logging:
  level:
    com.alibaba.nacos.client.config.impl.ClientWorker: warn
    com.alibaba.nacos: warn
