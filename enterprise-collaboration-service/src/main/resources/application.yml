spring:
  config:
    import: "optional:classpath:application-secrets.yml,optional:nacos:enterprise-collaboration-service.yaml,optional:nacos:common-config.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
  application:
    name: enterprise-collaboration-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yaml
        fail-fast: false
    compatibility-verifier:
      enabled: false
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql

server:
  port: 8090

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

auth:
  jwt:
    expiration: 86400000

logging:
  level:
    com.alibaba.nacos.client.config.impl.ClientWorker: warn
    com.alibaba.nacos: warn
