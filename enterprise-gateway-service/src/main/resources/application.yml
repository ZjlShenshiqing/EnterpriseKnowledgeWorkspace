spring:
  config:
    import: "optional:classpath:application-secrets.yml,optional:nacos:enterprise-gateway-service.yaml,optional:nacos:common-config.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
  application:
    name: enterprise-gateway-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yaml
        fail-fast: false
    compatibility-verifier:
      enabled: false
    gateway:
      default-filters:
        - PreserveHostHeader
      routes:
        - id: knowledge-ai
          uri: lb://enterprise-knowledge-ai-service
          predicates:
            - Path=/api/kb/**,/api/ai-qa/**
        - id: collaboration
          uri: lb://enterprise-collaboration-service
          predicates:
            - Path=/api/meetings/**,/api/todos/**,/api/tasks/**,/api/notifications/**,/api/chat/**,/api/docs/**,/api/approvals/**,/api/announcements/**,/api/intents/**,/api/keyword-mappings/**
        - id: platform-admin
          uri: lb://platform-admin-service
          predicates:
            - Path=/api/system/**
        - id: collaboration-ws
          uri: lb://enterprise-collaboration-service
          predicates:
            - Path=/ws/**

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8098

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger - %msg%n"
  level:
    com.alibaba.nacos.client.config.impl.ClientWorker: warn
    com.alibaba.nacos: warn

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false

app:
  security:
    whitelist:
      paths:
        - /api/system/health
        - /api/auth/login
        - /actuator/health
        - /actuator/info
  gateway:
    ip:
      blacklist: []
      whitelist: []
    rateLimit:
      enabled: true
      requests: 120
      windowSeconds: 60
