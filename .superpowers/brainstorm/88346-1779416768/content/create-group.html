<h2>创建群聊的设计方案</h2>
<p class="subtitle">点击消息列表顶部的"+"按钮，从右侧滑出面板选择成员并创建群聊</p>

<div style="display:flex;height:500px;background:#fff;border-radius:8px;overflow:hidden;font-size:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)">
  <!-- Conv list -->
  <div style="width:250px;border-right:1px solid #e5e6eb;display:flex;flex-direction:column;flex-shrink:0">
    <div style="padding:12px 16px;border-bottom:1px solid #e5e6eb">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <span style="font-weight:600;font-size:14px;flex:1">消息</span>
        <span style="width:28px;height:28px;border-radius:6px;background:#3370ff;color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer">+</span>
      </div>
    </div>
    <div style="flex:1;overflow-y:auto">
      <div style="padding:9px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;background:rgba(51,112,255,.06)">
        <div style="width:36px;height:36px;border-radius:8px;background:#3370ff;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">全</div>
        <div style="flex:1;min-width:0"><span style="font-weight:500;font-size:13px">全员群</span></div>
      </div>
      <div style="padding:9px 16px;display:flex;align-items:center;gap:10px;cursor:pointer">
        <div style="width:36px;height:36px;border-radius:8px;background:#34c759;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0">张</div>
        <div style="flex:1;min-width:0"><span style="font-weight:500;font-size:13px">张三</span></div>
      </div>
    </div>
  </div>

  <!-- Right panel: Create Group -->
  <div style="flex:1;display:flex;flex-direction:column;min-width:0;background:#fafafa">
    <div style="padding:14px 20px;border-bottom:1px solid #e5e6eb;display:flex;align-items:center;gap:10px;background:#fff">
      <span style="font-weight:600;font-size:14px">创建群聊</span>
      <div style="flex:1"></div>
      <span style="color:#8f959e;cursor:pointer;font-size:18px">✕</span>
    </div>

    <!-- Group name -->
    <div style="padding:16px 20px;background:#fff;margin-bottom:8px">
      <div style="font-size:12px;color:#8f959e;margin-bottom:6px;font-weight:500">群聊名称</div>
      <input style="width:100%;border:1px solid #e5e6eb;border-radius:8px;padding:10px 12px;font-size:13px;outline:none;box-sizing:border-box" placeholder="输入群聊名称（可选，默认为成员名称组合）" />
    </div>

    <!-- Member selection -->
    <div style="padding:0 20px;display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <span style="font-size:12px;color:#8f959e;font-weight:500">选择成员</span>
      <div style="flex:1"></div>
      <span style="font-size:11px;color:#3370ff;cursor:pointer">从组织架构选择</span>
    </div>

    <!-- Selected members tags -->
    <div style="padding:0 20px 8px;display:flex;flex-wrap:wrap;gap:6px">
      <div style="display:flex;align-items:center;gap:4px;background:#e8f3ff;color:#3370ff;padding:4px 10px;border-radius:14px;font-size:12px">张三 ✕</div>
      <div style="display:flex;align-items:center;gap:4px;background:#e8f3ff;color:#3370ff;padding:4px 10px;border-radius:14px;font-size:12px">李四 ✕</div>
    </div>

    <!-- Member search + list -->
    <div style="flex:1;overflow-y:auto;padding:0 20px">
      <div style="background:#fff;border:1px solid #e5e6eb;border-radius:10px;overflow:hidden">
        <div style="padding:8px 14px;border-bottom:1px solid #f0f1f3">
          <input style="width:100%;border:none;padding:6px 0;font-size:12px;outline:none" placeholder="搜索成员..." />
        </div>
        <!-- Department sections -->
        <div style="padding:6px 14px;font-size:11px;color:#8f959e;font-weight:500;background:#fafafa">产品部</div>
        <div style="padding:8px 14px;display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" checked style="accent-color:#3370ff;width:14px;height:14px" />
          <div style="width:30px;height:30px;border-radius:6px;background:#3370ff;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0">张</div>
          <span style="font-size:13px">张三</span>
          <span style="font-size:11px;color:#8f959e">产品经理</span>
        </div>
        <div style="padding:8px 14px;display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" style="accent-color:#3370ff;width:14px;height:14px" />
          <div style="width:30px;height:30px;border-radius:6px;background:#34c759;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0">王</div>
          <span style="font-size:13px">王五</span>
          <span style="font-size:11px;color:#8f959e">设计师</span>
        </div>
        <div style="padding:6px 14px;font-size:11px;color:#8f959e;font-weight:500;background:#fafafa">技术部</div>
        <div style="padding:8px 14px;display:flex;align-items:center;gap:10px;cursor:pointer">
          <input type="checkbox" checked style="accent-color:#3370ff;width:14px;height:14px" />
          <div style="width:30px;height:30px;border-radius:6px;background:#ff9500;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0">李</div>
          <span style="font-size:13px">李四</span>
          <span style="font-size:11px;color:#8f959e">工程师</span>
        </div>
      </div>
    </div>

    <!-- Bottom buttons -->
    <div style="padding:14px 20px;border-top:1px solid #e5e6eb;display:flex;gap:10px;justify-content:flex-end;background:#fff">
      <div style="padding:8px 20px;border:1px solid #e5e6eb;border-radius:6px;font-size:13px;cursor:pointer;color:#666">取消</div>
      <div style="padding:8px 24px;background:#3370ff;color:#fff;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500">创建群聊 (2人)</div>
    </div>
  </div>
</div>
