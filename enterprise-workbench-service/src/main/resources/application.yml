spring:
  config:
    import: "optional:classpath:application-secrets.yml,optional:nacos:enterprise-workbench-service.yaml,optional:nacos:common-config.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
  application:
    name: enterprise-workbench-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yaml
        fail-fast: false
    compatibility-verifier:
      enabled: false
server:
  port: 8084

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
