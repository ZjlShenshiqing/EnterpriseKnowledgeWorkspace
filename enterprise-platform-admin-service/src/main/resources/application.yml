server:
  port: 8084

spring:
  config:
    import: "optional:nacos:platform-admin-service.yml,optional:nacos:common-config.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
  application:
    name: platform-admin-service
  datasource:
    url: jdbc:mysql://localhost:3306/enterprise_gateway?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: never
  cloud:
    compatibility-verifier:
      enabled: false
    nacos:
      discovery:
        server-addr: localhost:8848
        ip: ${NACOS_DISCOVERY_IP:127.0.0.1}
        port: ${server.port}
      config:
        server-addr: localhost:8848
        file-extension: yml

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.zjl.platform: debug
