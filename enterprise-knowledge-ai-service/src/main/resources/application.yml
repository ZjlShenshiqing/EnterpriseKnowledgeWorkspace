spring:
  config:
    import: "optional:classpath:application-secrets.yml,optional:nacos:enterprise-knowledge-ai-service.yaml,optional:nacos:common-config.yaml?group=DEFAULT_GROUP&refreshEnabled=true"
  application:
    name: enterprise-knowledge-ai-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        ip: ${NACOS_DISCOVERY_IP:127.0.0.1}
        port: ${server.port}
      config:
        server-addr: localhost:8848
        file-extension: yaml
        fail-fast: false
    compatibility-verifier:
      enabled: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 55MB
  sql:
    init:
      mode: never

server:
  port: 8083

mybatis-plus:
  mapper-locations: classpath:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  kb:
    storage:
      type: s3
      upload-dir: ./data/kb-uploads
      s3:
        endpoint: https://oss-cn-shenzhen.aliyuncs.com
        region: oss-cn-shenzhen
        access-key:            # 在 application-secrets.yml 中配置
        secret-key:            # 在 application-secrets.yml 中配置
        bucket: kb-documents
  knowledge:
    embedding-model: text-embedding-v3
    embedding-base-url: https://dashscope.aliyuncs.com/compatible-mode
    vector-write-enabled: true    # 全局向量写入开关
    sensitivity:
      enabled: true
      keywords:
        - 薪资
        - 财务数据
        - 战略
        - 未公开
        - 机密
        - 预算
        - 股权
  milvus:
    uri: http://localhost:19530
    collection: kb_chunk_embedding
    vector-dimension: 1024
    # 为 true 时：启动必须完成 Milvus 建表与 load。当 embedding-model 为空且仅使用文档分块功能时，可设为 false 允许无 Milvus 启动
    fail-on-init: false
  agent:
    llm:
      provider: deepseek
      base-url: https://api.deepseek.com
      model: deepseek-chat
      max-tokens: 4096
      temperature: 0.3
    session:
      max-history: 50
      archive-after-days: 30
    web-search:
      enabled: true
      api-key: sk-0d6ebe5d5f9d4746ad3d3cd4a36a7e53
      base-url: https://api.bochaai.com/v1
      count: 8
      freshness: noLimit
    collaboration:
      base-url: http://localhost:8090

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger - %msg%n"
  level:
    com.alibaba.nacos.client.config.impl.ClientWorker: warn
    com.alibaba.nacos: warn

management:
  endpoints:
    web:
      exposure:
        include: health,info
